<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC P2P - Firebase</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 20px auto;
      padding: 0 15px;
    }

    button {
      margin: 5px;
      padding: 10px 15px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #4CAF50;
      color: white;
      font-size: 14px;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #ccc;
    }

    .section {
      border: 1px solid #ccc;
      padding: 15px;
      margin: 15px 0;
      border-radius: 8px;
      background: #f9f9f9;
    }

    #qrcode {
      text-align: center;
      padding: 20px;
      background: white;
      border-radius: 8px;
      margin: 10px 0;
    }

    #qrcode canvas {
      max-width: 100%;
      height: auto;
    }

    #chat {
      border: 1px solid #aaa;
      height: 200px;
      overflow-y: auto;
      padding: 10px;
      background: white;
      margin-bottom: 10px;
      border-radius: 5px;
    }

    .video-container {
      display: flex;
      gap: 10px;
      margin: 10px 0;
      flex-wrap: wrap;
    }

    .video-wrapper {
      position: relative;
      flex: 1;
      min-width: 200px;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }

    .video-wrapper video {
      width: 100%;
      height: auto;
      display: block;
      max-height: 300px;
      object-fit: cover;
    }

    .video-label {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 12px;
    }

    #localVideo {
      transform: scaleX(-1);
    }

    input[type="text"] {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    #roomIdInput {
      width: 150px;
      margin-right: 10px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    #messageInput {
      width: calc(100% - 80px);
    }

    .status {
      padding: 8px 12px;
      border-radius: 5px;
      display: inline-block;
      font-weight: bold;
    }

    .status.waiting {
      background: #ff9800;
      color: white;
    }

    .status.connected {
      background: #4CAF50;
      color: white;
    }

    .status.failed {
      background: #f44336;
      color: white;
    }

    .room-id {
      background: #e3f2fd;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      margin: 10px 0;
    }

    .room-id-value {
      font-size: 32px;
      font-weight: bold;
      color: #1976D2;
      letter-spacing: 3px;
      margin: 10px 0;
      user-select: all;
    }

    .step {
      background: #fff3e0;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border-left: 4px solid #FF9800;
    }

    h3 {
      margin-top: 0;
      color: #333;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }
  </style>
</head>

<body>
  <h2>🔗 WebRTC P2P（Firebase）</h2>
  <p style="color: #666; font-size: 14px;">使用 Firebase 实时数据库，输入房间号即可连接</p>

  <div class="section">
    <h3>连接状态</h3>
    <span id="status" class="status waiting">等待操作</span>
  </div>

  <div class="section">
    <h3>🐛 调试日志</h3>
    <div id="debugLog"
      style="background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; white-space: pre-wrap;">
    </div>
    <button onclick="document.getElementById('debugLog').innerHTML = ''" style="background: #666; margin-top: 10px;">🗑️
      清空日志</button>
  </div>

  <div class="section">
    <h3>🚪 创建或加入房间</h3>
    <div class="step">
      创建房间：点击"创建房间"生成 6 位房间号<br>
      加入房间：输入对方的房间号，点击"加入房间"
    </div>
    <button id="createRoomBtn">🆕 创建房间</button>
    <br><br>
    <input type="text" id="roomIdInput" placeholder="房间号" maxlength="6">
    <button id="joinRoomBtn">🚀 加入房间</button>
    <button id="leaveRoomBtn" disabled style="background: #f44336;">🚪 离开房间</button>

    <div id="roomDisplay" style="display:none;">
      <div class="room-id">
        <div>当前房间号</div>
        <div class="room-id-value" id="currentRoomId"></div>
        <button id="copyRoomBtn">📋 复制房间号</button>
        <button id="showQrBtn">📷 显示二维码</button>
      </div>
      <div id="qrcode" style="display:none;"></div>
    </div>
  </div>

  <div class="section">
    <h3>🎤 语音/视频通话</h3>
    <div class="step">
      加入房间后可以开始通话
    </div>
    <button id="callBtn" disabled>📞 语音通话</button>
    <button id="videoCallBtn" disabled>📹 视频通话</button>
    <button id="hangupBtn" disabled style="background: #f44336;">📴 挂断</button>
    <button id="muteBtn" disabled>🔇 静音</button>
    <button id="toggleVideoBtn" disabled>📷 关闭摄像头</button>

    <div class="video-container" id="videoContainer" style="display: none;">
      <div class="video-wrapper">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="video-label">我</div>
      </div>
      <div class="video-wrapper">
        <video id="remoteVideo" autoplay playsinline></video>
        <div class="video-label">对方</div>
      </div>
    </div>

    <audio id="remoteAudio" autoplay></audio>
  </div>

  <div class="section">
    <h3>💬 聊天</h3>
    <div id="chat"></div>
    <input type="text" id="messageInput" placeholder="输入消息..." disabled>
    <button id="sendBtn" disabled>发送</button>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <script>
    // Firebase 配置（使用公共测试项目）
    const firebaseConfig = {
      apiKey: "AIzaSyB1ohgJExMps3YwIbTvU5GKJVTOGNxqWHg",
      authDomain: "webrtc-f1c77.firebaseapp.com",
      databaseURL: "https://webrtc-f1c77-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "webrtc-f1c77",
      storageBucket: "webrtc-f1c77.firebasestorage.app",
      messagingSenderId: "331514264045",
      appId: "1:331514264045:web:1c06dab627d393026d0fe4",
      measurementId: "G-5E0RJMJTFW"
    };

    // 初始化 Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // WebRTC 配置
    const configuration = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" }
      ]
    };

    let pc;
    let localStream;
    let currentCall;
    let roomId;
    let isOfferer = false;
    let roomRef;
    let isMuted = false;
    let isVideoEnabled = true;
    let isVideoCall = false;

    // 调试日志
    function log(message, data = null) {
      const debugLog = document.getElementById('debugLog');
      const time = new Date().toLocaleTimeString();
      let logText = `[${time}] ${message}`;
      if (data) {
        logText += '\n' + JSON.stringify(data, null, 2);
      }
      debugLog.innerHTML += logText + '\n\n';
      debugLog.scrollTop = debugLog.scrollHeight;
      console.log(message, data || '');
    }

    // 生成随机房间号
    function generateRoomId() {
      return Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    // 创建房间
    document.getElementById('createRoomBtn').addEventListener('click', async () => {
      roomId = generateRoomId();
      isOfferer = true;

      await joinRoom(roomId);
      addChatMessage('系统', `房间已创建: ${roomId}`);
    });

    // 加入房间
    document.getElementById('joinRoomBtn').addEventListener('click', async () => {
      const inputRoomId = document.getElementById('roomIdInput').value.trim().toUpperCase();

      if (!inputRoomId || inputRoomId.length !== 6) {
        alert('请输入 6 位房间号');
        return;
      }

      roomId = inputRoomId;
      isOfferer = false;

      await joinRoom(roomId);
    });

    // 加入房间逻辑
    async function joinRoom(roomId) {
      log('开始加入房间: ' + roomId);
      updateStatus('正在加入房间...');

      roomRef = database.ref('rooms/' + roomId);

      // 显示房间信息
      document.getElementById('currentRoomId').textContent = roomId;
      document.getElementById('roomDisplay').style.display = 'block';
      document.getElementById('createRoomBtn').disabled = true;
      document.getElementById('joinRoomBtn').disabled = true;
      document.getElementById('roomIdInput').disabled = true;
      document.getElementById('leaveRoomBtn').disabled = false;
      document.getElementById('callBtn').disabled = false;
      document.getElementById('videoCallBtn').disabled = false;
      document.getElementById('messageInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;

      // 创建 PeerConnection
      log('创建 PeerConnection');
      createPeerConnection();

      if (isOfferer) {
        log('作为发起端创建 offer');
        // 发起端：创建 offer
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        log('Offer 创建成功', { type: offer.type });

        await roomRef.child('offer').set({
          type: offer.type,
          sdp: offer.sdp
        });
        log('Offer 已写入 Firebase');

        addChatMessage('系统', '等待对方加入...');
        updateStatus('等待对方加入');

        // 监听 answer
        roomRef.child('answer').on('value', async (snapshot) => {
          const answer = snapshot.val();
          if (answer && !pc.currentRemoteDescription) {
            log('收到 answer', { type: answer.type });
            await pc.setRemoteDescription(new RTCSessionDescription(answer));
            log('Answer 设置成功');
            addChatMessage('系统', '对方已加入房间');
            updateStatus('正在建立连接...');
          }
        });
      } else {
        log('作为接收端等待 offer');
        // 接收端：等待 offer
        const offerSnapshot = await roomRef.child('offer').get();
        const offer = offerSnapshot.val();

        if (!offer) {
          log('错误: 房间不存在');
          alert('房间不存在或已过期');
          leaveRoom();
          return;
        }

        log('收到 offer', { type: offer.type });
        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        log('Offer 设置成功');

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        log('Answer 创建成功', { type: answer.type });

        await roomRef.child('answer').set({
          type: answer.type,
          sdp: answer.sdp
        });
        log('Answer 已写入 Firebase');

        addChatMessage('系统', '已加入房间');
        updateStatus('正在建立连接...');
      }

      // 监听 ICE 候选
      const candidatesRef = roomRef.child(isOfferer ? 'calleeCandidates' : 'callerCandidates');
      candidatesRef.on('child_added', async (snapshot) => {
        const candidate = snapshot.val();
        if (candidate) {
          log('收到远端 ICE 候选', { type: candidate.type });
          try {
            await pc.addIceCandidate(new RTCIceCandidate(candidate));
            log('ICE 候选添加成功');
          } catch (err) {
            log('ICE 候选添加失败: ' + err.message);
          }
        }
      });

      // 监听聊天消息
      roomRef.child('messages').on('child_added', (snapshot) => {
        const msg = snapshot.val();
        if (msg && msg.sender !== 'me') {
          addChatMessage('对方', msg.text);
        }
      });
    }

    // 离开房间
    document.getElementById('leaveRoomBtn').addEventListener('click', () => {
      leaveRoom();
    });

    function leaveRoom() {
      if (pc) {
        pc.close();
        pc = null;
      }

      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }

      if (roomRef) {
        roomRef.off();
        if (isOfferer) {
          roomRef.remove();
        }
        roomRef = null;
      }

      document.getElementById('roomDisplay').style.display = 'none';
      document.getElementById('createRoomBtn').disabled = false;
      document.getElementById('joinRoomBtn').disabled = false;
      document.getElementById('roomIdInput').disabled = false;
      document.getElementById('roomIdInput').value = '';
      document.getElementById('leaveRoomBtn').disabled = true;
      document.getElementById('callBtn').disabled = true;
      document.getElementById('videoCallBtn').disabled = true;
      document.getElementById('hangupBtn').disabled = true;
      document.getElementById('muteBtn').disabled = true;
      document.getElementById('toggleVideoBtn').disabled = true;
      document.getElementById('messageInput').disabled = true;
      document.getElementById('sendBtn').disabled = true;
      document.getElementById('videoContainer').style.display = 'none';

      updateStatus('已离开房间');
      addChatMessage('系统', '已离开房间');
    }

    // 创建 PeerConnection
    function createPeerConnection() {
      pc = new RTCPeerConnection(configuration);

      // ICE 候选
      pc.onicecandidate = (event) => {
        if (event.candidate && roomRef) {
          log('生成 ICE 候选', {
            type: event.candidate.type,
            protocol: event.candidate.protocol
          });
          const candidatesRef = roomRef.child(isOfferer ? 'callerCandidates' : 'calleeCandidates');
          candidatesRef.push(event.candidate.toJSON());
        } else if (!event.candidate) {
          log('ICE 候选收集完成');
        }
      };

      // ICE 连接状态
      pc.oniceconnectionstatechange = () => {
        log('ICE 连接状态: ' + pc.iceConnectionState);
      };

      // ICE 收集状态
      pc.onicegatheringstatechange = () => {
        log('ICE 收集状态: ' + pc.iceGatheringState);
      };

      // 连接状态
      pc.onconnectionstatechange = () => {
        log('连接状态: ' + pc.connectionState);
        updateStatus(`连接状态: ${pc.connectionState}`);

        if (pc.connectionState === 'connected') {
          log('✅ P2P 连接成功！');
          addChatMessage('系统', '✅ P2P 连接已建立');
          updateStatus('✅ 已连接');
        } else if (pc.connectionState === 'failed') {
          log('❌ 连接失败');
          addChatMessage('系统', '❌ 连接失败');
          updateStatus('❌ 连接失败');
        }
      };

      // 信令状态
      pc.onsignalingstatechange = () => {
        log('信令状态: ' + pc.signalingState);
      };

      // 接收远端媒体流
      pc.ontrack = (event) => {
        log('收到远端媒体流');
        if (isVideoCall) {
          document.getElementById('remoteVideo').srcObject = event.streams[0];
        } else {
          document.getElementById('remoteAudio').srcObject = event.streams[0];
        }
        addChatMessage('系统', '收到对方的媒体流');
      };
    }

    // 语音通话
    document.getElementById('callBtn').addEventListener('click', async () => {
      isVideoCall = false;
      await startCall(false);
    });

    // 视频通话
    document.getElementById('videoCallBtn').addEventListener('click', async () => {
      isVideoCall = true;
      await startCall(true);
    });

    async function startCall(video) {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          audio: true,
          video: video
        });

        if (video) {
          document.getElementById('localVideo').srcObject = localStream;
          document.getElementById('videoContainer').style.display = 'flex';
        }

        localStream.getTracks().forEach(track => {
          pc.addTrack(track, localStream);
        });

        document.getElementById('callBtn').disabled = true;
        document.getElementById('videoCallBtn').disabled = true;
        document.getElementById('hangupBtn').disabled = false;
        document.getElementById('muteBtn').disabled = false;
        if (video) {
          document.getElementById('toggleVideoBtn').disabled = false;
        }

        addChatMessage('系统', video ? '视频通话已开始' : '语音通话已开始');

        // 重新协商
        if (isOfferer) {
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          await roomRef.child('offer').set({
            type: offer.type,
            sdp: offer.sdp
          });
        }
      } catch (err) {
        alert('无法访问摄像头/麦克风: ' + err.message);
      }
    }

    // 挂断
    document.getElementById('hangupBtn').addEventListener('click', () => {
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }

      document.getElementById('localVideo').srcObject = null;
      document.getElementById('remoteVideo').srcObject = null;
      document.getElementById('remoteAudio').srcObject = null;
      document.getElementById('videoContainer').style.display = 'none';

      document.getElementById('callBtn').disabled = false;
      document.getElementById('videoCallBtn').disabled = false;
      document.getElementById('hangupBtn').disabled = true;
      document.getElementById('muteBtn').disabled = true;
      document.getElementById('toggleVideoBtn').disabled = true;

      addChatMessage('系统', '通话已结束');
    });

    // 静音
    document.getElementById('muteBtn').addEventListener('click', () => {
      if (localStream) {
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
          isMuted = !isMuted;
          audioTrack.enabled = !isMuted;
          document.getElementById('muteBtn').textContent = isMuted ? '🔊 取消静音' : '🔇 静音';
        }
      }
    });

    // 关闭摄像头
    document.getElementById('toggleVideoBtn').addEventListener('click', () => {
      if (localStream) {
        const videoTrack = localStream.getVideoTracks()[0];
        if (videoTrack) {
          isVideoEnabled = !isVideoEnabled;
          videoTrack.enabled = isVideoEnabled;
          document.getElementById('toggleVideoBtn').textContent = isVideoEnabled ? '📷 关闭摄像头' : '📹 开启摄像头';
        }
      }
    });

    // 复制房间号
    document.getElementById('copyRoomBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(roomId).then(() => {
        alert('房间号已复制到剪贴板');
      });
    });

    // 显示二维码
    document.getElementById('showQrBtn').addEventListener('click', () => {
      const qrcodeDiv = document.getElementById('qrcode');

      if (qrcodeDiv.style.display === 'none') {
        qrcodeDiv.innerHTML = '';
        qrcodeDiv.style.display = 'block';

        const url = `${window.location.origin}${window.location.pathname}?room=${roomId}`;

        new QRCode(qrcodeDiv, {
          text: url,
          width: 256,
          height: 256
        });

        document.getElementById('showQrBtn').textContent = '❌ 隐藏二维码';
      } else {
        qrcodeDiv.style.display = 'none';
        document.getElementById('showQrBtn').textContent = '📷 显示二维码';
      }
    });

    // 发送消息
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const msg = input.value.trim();

      if (msg && roomRef) {
        roomRef.child('messages').push({
          text: msg,
          sender: 'me',
          timestamp: Date.now()
        });

        addChatMessage('我', msg);
        input.value = '';
      }
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);

    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    // 更新状态
    function updateStatus(text) {
      const statusEl = document.getElementById('status');
      statusEl.textContent = text;

      if (text.includes('已连接')) {
        statusEl.className = 'status connected';
      } else if (text.includes('失败') || text.includes('已断开')) {
        statusEl.className = 'status failed';
      } else {
        statusEl.className = 'status waiting';
      }
    }

    // 添加聊天消息
    function addChatMessage(sender, msg) {
      const chat = document.getElementById('chat');
      const time = new Date().toLocaleTimeString();
      chat.innerHTML += `<div><small>${time}</small> <b>${sender}:</b> ${msg}</div>`;
      chat.scrollTop = chat.scrollHeight;
    }

    // 检查 URL 参数
    window.addEventListener('load', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const room = urlParams.get('room');

      if (room) {
        document.getElementById('roomIdInput').value = room;
        addChatMessage('系统', `检测到房间号: ${room}`);
      }
    });
  </script>
</body>

</html>
