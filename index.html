<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC P2P - Firebase Signaling</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 20px auto;
      padding: 0 15px;
    }

    button {
      margin: 5px;
      padding: 10px 15px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #4CAF50;
      color: white;
      font-size: 14px;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #ccc;
    }

    .section {
      border: 1px solid #ccc;
      padding: 15px;
      margin: 15px 0;
      border-radius: 8px;
      background: #f9f9f9;
    }

    #qrcode {
      text-align: center;
      padding: 20px;
      background: white;
      border-radius: 8px;
      margin: 10px 0;
    }

    #qrcode canvas {
      max-width: 100%;
      height: auto;
    }

    #chat {
      border: 1px solid #aaa;
      height: 200px;
      overflow-y: auto;
      padding: 10px;
      background: white;
      margin-bottom: 10px;
      border-radius: 5px;
    }

    .video-container {
      display: flex;
      gap: 10px;
      margin: 10px 0;
      flex-wrap: wrap;
    }

    .video-wrapper {
      position: relative;
      flex: 1;
      min-width: 200px;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }

    .video-wrapper video {
      width: 100%;
      height: auto;
      display: block;
      max-height: 300px;
      object-fit: cover;
    }

    .video-label {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 12px;
    }

    #localVideo {
      transform: scaleX(-1);
    }

    input[type="text"] {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    #peerIdInput {
      width: 200px;
      margin-right: 10px;
    }

    #messageInput {
      width: calc(100% - 80px);
    }

    .status {
      padding: 8px 12px;
      border-radius: 5px;
      display: inline-block;
      font-weight: bold;
    }

    .status.waiting {
      background: #ff9800;
      color: white;
    }

    .status.connected {
      background: #4CAF50;
      color: white;
    }

    .status.failed {
      background: #f44336;
      color: white;
    }

    .my-id {
      background: #e3f2fd;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      margin: 10px 0;
    }

    .my-id-value {
      font-size: 24px;
      font-weight: bold;
      color: #1976D2;
      letter-spacing: 2px;
      margin: 10px 0;
      user-select: all;
      word-break: break-all;
    }

    .step {
      background: #fff3e0;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border-left: 4px solid #FF9800;
    }

    h3 {
      margin-top: 0;
      color: #333;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }
  </style>
</head>

<body>
  <h2>WebRTC P2P（Firebase Signaling）</h2>
  <p style="color: #666; font-size: 14px;">使用 Firebase 匿名登录和 Realtime Database 交换信令</p>

  <div class="section">
    <h3>连接状态</h3>
    <span id="status" class="status waiting">正在初始化...</span>
  </div>

  <div class="section">
    <h3>你的房间 ID</h3>
    <div class="my-id">
      <div id="myIdDisplay" class="loading">正在生成...</div>
      <button id="copyIdBtn" style="display:none;">复制房间 ID</button>
      <button id="showQrBtn" style="display:none;">显示二维码</button>
    </div>
    <div id="qrcode" style="display:none;"></div>
  </div>

  <div class="section">
    <h3>连接到房间</h3>
    <div class="step">
      输入对方的房间 ID，点击连接即可建立 P2P 连接
    </div>
    <input type="text" id="peerIdInput" placeholder="输入房间 ID">
    <button id="connectBtn" disabled>连接</button>
  </div>

  <div class="section">
    <h3>语音/视频通话</h3>
    <div class="step">
      建立连接后可以开始语音或视频通话
    </div>
    <button id="callBtn" disabled>语音通话</button>
    <button id="videoCallBtn" disabled>视频通话</button>
    <button id="hangupBtn" disabled style="background: #f44336;">挂断</button>
    <button id="muteBtn" disabled>静音</button>
    <button id="toggleVideoBtn" disabled>关闭摄像头</button>
    <div id="callStatus" style="margin-top: 10px; color: #666;"></div>

    <div class="video-container" id="videoContainer" style="display: none;">
      <div class="video-wrapper">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="video-label">我</div>
      </div>
      <div class="video-wrapper">
        <video id="remoteVideo" autoplay playsinline></video>
        <div class="video-label">对方</div>
      </div>
    </div>

    <audio id="remoteAudio" autoplay></audio>
  </div>

  <div class="section">
    <h3>聊天</h3>
    <div id="chat"></div>
    <input type="text" id="messageInput" placeholder="输入消息..." disabled>
    <button id="sendBtn" disabled>发送</button>
  </div>

  <script src="./qrcode.min.js"></script>
  <script type="module" src="./dist/app.js"></script>
</body>

</html>
