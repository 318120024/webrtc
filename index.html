<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC P2P - URL 信令传递</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 20px auto;
      padding: 0 15px;
    }

    button {
      margin: 5px;
      padding: 10px 15px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #4CAF50;
      color: white;
      font-size: 14px;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #ccc;
    }

    .section {
      border: 1px solid #ccc;
      padding: 15px;
      margin: 15px 0;
      border-radius: 8px;
      background: #f9f9f9;
    }

    #qrcode {
      text-align: center;
      padding: 20px;
      background: white;
      border-radius: 8px;
      margin: 10px 0;
    }

    #qrcode canvas {
      max-width: 100%;
      height: auto;
    }

    #chat {
      border: 1px solid #aaa;
      height: 200px;
      overflow-y: auto;
      padding: 10px;
      background: white;
      margin-bottom: 10px;
      border-radius: 5px;
    }

    input[type="text"] {
      width: calc(100% - 80px);
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .status {
      padding: 8px 12px;
      border-radius: 5px;
      display: inline-block;
      font-weight: bold;
    }

    .status.waiting {
      background: #ff9800;
      color: white;
    }

    .status.connected {
      background: #4CAF50;
      color: white;
    }

    .status.failed {
      background: #f44336;
      color: white;
    }

    .url-box {
      background: white;
      padding: 10px;
      border-radius: 5px;
      word-break: break-all;
      font-size: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
    }

    .step {
      background: #e3f2fd;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border-left: 4px solid #2196F3;
    }

    h3 {
      margin-top: 0;
      color: #333;
    }
  </style>
</head>

<body>
  <h2>🔗 WebRTC P2P（URL 信令传递）</h2>
  <p style="color: #666; font-size: 14px;">完全无服务器模式，通过 URL 或二维码交换信令</p>

  <div class="section">
    <h3>连接状态</h3>
    <span id="status" class="status waiting">等待操作</span>
  </div>

  <div class="section">
    <h3>步骤 1：生成邀请链接</h3>
    <div class="step">
      点击下方按钮生成包含你的信令数据的链接，分享给对方
    </div>
    <button id="createOfferBtn">📤 生成邀请链接</button>
    <div id="offerResult" style="display:none;">
      <p><strong>方式 1：扫描二维码</strong></p>
      <div id="qrcodeOffer"></div>
      <p><strong>方式 2：复制链接</strong></p>
      <div class="url-box" id="offerUrl"></div>
      <button id="copyOfferBtn">📋 复制链接</button>
    </div>
  </div>

  <div class="section">
    <h3>步骤 2：接收对方的回复</h3>
    <div class="step">
      对方打开你的链接后会生成回复链接，扫描或粘贴对方的回复链接
    </div>
    <input type="text" id="answerInput" placeholder="粘贴对方的回复链接...">
    <button id="processAnswerBtn">✅ 处理回复</button>
  </div>

  <div class="section">
    <h3>💬 聊天</h3>
    <div id="chat"></div>
    <input type="text" id="messageInput" placeholder="输入消息..." disabled>
    <button id="sendBtn" disabled>发送</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    const configuration = {
      iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    };

    let pc;
    let dataChannel;
    let collectedCandidates = [];
    let isOfferer = false;

    // 页面加载时检查 URL 参数
    window.addEventListener('load', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const signalData = urlParams.get('signal');

      if (signalData) {
        processIncomingSignal(signalData);
      }
    });

    // 生成 Offer
    document.getElementById('createOfferBtn').addEventListener('click', async () => {
      isOfferer = true;
      collectedCandidates = [];

      createPeerConnection(true);

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      updateStatus('正在收集网络信息...');

      // 等待 ICE 候选收集完成
      await waitForIceCandidates();

      const signalData = {
        type: 'offer',
        sdp: pc.localDescription,
        candidates: collectedCandidates
      };

      const encodedData = btoa(JSON.stringify(signalData));
      const url = `${window.location.origin}${window.location.pathname}?signal=${encodedData}`;

      displayOfferUrl(url);
      updateStatus('等待对方回复');
    });

    // 处理传入的信令
    async function processIncomingSignal(encodedData) {
      try {
        const signalData = JSON.parse(atob(encodedData));

        if (signalData.type === 'offer') {
          // 收到 offer，生成 answer
          updateStatus('收到邀请，正在生成回复...');
          await handleOffer(signalData);
        } else if (signalData.type === 'answer') {
          // 收到 answer，完成连接
          updateStatus('收到回复，正在建立连接...');
          await handleAnswer(signalData);
        }
      } catch (err) {
        console.error('处理信令失败:', err);
        alert('无效的信令数据');
      }
    }

    // 处理 Offer
    async function handleOffer(signalData) {
      isOfferer = false;
      collectedCandidates = [];

      createPeerConnection(false);

      await pc.setRemoteDescription(new RTCSessionDescription(signalData.sdp));

      // 添加远端 ICE 候选
      for (const candidate of signalData.candidates) {
        await pc.addIceCandidate(new RTCIceCandidate(candidate));
      }

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      // 等待 ICE 候选收集完成
      await waitForIceCandidates();

      const answerData = {
        type: 'answer',
        sdp: pc.localDescription,
        candidates: collectedCandidates
      };

      const encodedData = btoa(JSON.stringify(answerData));
      const url = `${window.location.origin}${window.location.pathname}?signal=${encodedData}`;

      // 显示回复链接
      alert('请将下方生成的回复链接发送给对方！');
      displayOfferUrl(url);
      updateStatus('等待连接建立');
    }

    // 处理 Answer
    async function handleAnswer(signalData) {
      await pc.setRemoteDescription(new RTCSessionDescription(signalData.sdp));

      // 添加远端 ICE 候选
      for (const candidate of signalData.candidates) {
        await pc.addIceCandidate(new RTCIceCandidate(candidate));
      }

      updateStatus('正在建立连接...');
    }

    // 处理回复按钮
    document.getElementById('processAnswerBtn').addEventListener('click', () => {
      const input = document.getElementById('answerInput').value.trim();
      if (!input) {
        alert('请粘贴对方的回复链接');
        return;
      }

      try {
        const url = new URL(input);
        const signalData = url.searchParams.get('signal');
        if (signalData) {
          processIncomingSignal(signalData);
        } else {
          alert('链接中没有找到信令数据');
        }
      } catch (err) {
        alert('无效的链接格式');
      }
    });

    // 创建 PeerConnection
    function createPeerConnection(isOfferer) {
      if (pc) pc.close();

      pc = new RTCPeerConnection(configuration);

      pc.onicecandidate = (event) => {
        if (event.candidate) {
          collectedCandidates.push(event.candidate);
        }
      };

      pc.onconnectionstatechange = () => {
        updateStatus(`连接状态: ${pc.connectionState}`);

        if (pc.connectionState === 'connected') {
          updateStatus('✅ 已连接');
          document.getElementById('messageInput').disabled = false;
          document.getElementById('sendBtn').disabled = false;
          addChatMessage('系统', '连接成功！可以开始聊天了');
        } else if (pc.connectionState === 'failed') {
          updateStatus('❌ 连接失败');
        }
      };

      if (isOfferer) {
        dataChannel = pc.createDataChannel('chat');
        setupDataChannel(dataChannel);
      } else {
        pc.ondatachannel = (event) => {
          dataChannel = event.channel;
          setupDataChannel(dataChannel);
        };
      }
    }

    // 设置数据通道
    function setupDataChannel(channel) {
      channel.onopen = () => {
        addChatMessage('系统', '数据通道已打开');
      };

      channel.onmessage = (e) => {
        addChatMessage('对方', e.data);
      };

      channel.onclose = () => {
        addChatMessage('系统', '数据通道已关闭');
      };
    }

    // 等待 ICE 候选收集完成
    function waitForIceCandidates() {
      return new Promise((resolve) => {
        if (pc.iceGatheringState === 'complete') {
          resolve();
        } else {
          pc.addEventListener('icegatheringstatechange', () => {
            if (pc.iceGatheringState === 'complete') {
              resolve();
            }
          });
        }
      });
    }

    // 显示 Offer URL
    function displayOfferUrl(url) {
      document.getElementById('offerResult').style.display = 'block';
      document.getElementById('offerUrl').textContent = url;

      // 生成二维码
      const qrcodeDiv = document.getElementById('qrcodeOffer');
      qrcodeDiv.innerHTML = '';
      new QRCode(qrcodeDiv, {
        text: url,
        width: 256,
        height: 256
      });
    }

    // 复制链接
    document.getElementById('copyOfferBtn').addEventListener('click', () => {
      const url = document.getElementById('offerUrl').textContent;
      navigator.clipboard.writeText(url).then(() => {
        alert('链接已复制到剪贴板');
      });
    });

    // 更新状态
    function updateStatus(text) {
      const statusEl = document.getElementById('status');
      statusEl.textContent = text;

      if (text.includes('已连接')) {
        statusEl.className = 'status connected';
      } else if (text.includes('失败')) {
        statusEl.className = 'status failed';
      } else {
        statusEl.className = 'status waiting';
      }
    }

    // 添加聊天消息
    function addChatMessage(sender, msg) {
      const chat = document.getElementById('chat');
      const time = new Date().toLocaleTimeString();
      chat.innerHTML += `<div><small>${time}</small> <b>${sender}:</b> ${msg}</div>`;
      chat.scrollTop = chat.scrollHeight;
    }

    // 发送消息
    document.getElementById('sendBtn').addEventListener('click', () => {
      const input = document.getElementById('messageInput');
      const msg = input.value.trim();
      if (msg && dataChannel && dataChannel.readyState === 'open') {
        dataChannel.send(msg);
        addChatMessage('我', msg);
        input.value = '';
      }
    });

    // 回车发送
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('sendBtn').click();
      }
    });
  </script>
</body>

</html>
