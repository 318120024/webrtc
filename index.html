<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC P2P - PeerJS</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 20px auto;
      padding: 0 15px;
    }

    button {
      margin: 5px;
      padding: 10px 15px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #4CAF50;
      color: white;
      font-size: 14px;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #ccc;
    }

    .section {
      border: 1px solid #ccc;
      padding: 15px;
      margin: 15px 0;
      border-radius: 8px;
      background: #f9f9f9;
    }

    #qrcode {
      text-align: center;
      padding: 20px;
      background: white;
      border-radius: 8px;
      margin: 10px 0;
    }

    #qrcode canvas {
      max-width: 100%;
      height: auto;
    }

    #chat {
      border: 1px solid #aaa;
      height: 200px;
      overflow-y: auto;
      padding: 10px;
      background: white;
      margin-bottom: 10px;
      border-radius: 5px;
    }

    input[type="text"] {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    #peerIdInput {
      width: 200px;
      margin-right: 10px;
    }

    #messageInput {
      width: calc(100% - 80px);
    }

    .status {
      padding: 8px 12px;
      border-radius: 5px;
      display: inline-block;
      font-weight: bold;
    }

    .status.waiting {
      background: #ff9800;
      color: white;
    }

    .status.connected {
      background: #4CAF50;
      color: white;
    }

    .status.failed {
      background: #f44336;
      color: white;
    }

    .my-id {
      background: #e3f2fd;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      margin: 10px 0;
    }

    .my-id-value {
      font-size: 24px;
      font-weight: bold;
      color: #1976D2;
      letter-spacing: 2px;
      margin: 10px 0;
      user-select: all;
    }

    .step {
      background: #fff3e0;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border-left: 4px solid #FF9800;
    }

    h3 {
      margin-top: 0;
      color: #333;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }
  </style>
</head>

<body>
  <h2>🔗 WebRTC P2P（PeerJS）</h2>
  <p style="color: #666; font-size: 14px;">使用 PeerJS 公共服务器，只需输入对方 ID 即可连接</p>

  <div class="section">
    <h3>连接状态</h3>
    <span id="status" class="status waiting">正在初始化...</span>
  </div>

  <div class="section">
    <h3>📱 你的 ID</h3>
    <div class="my-id">
      <div id="myIdDisplay" class="loading">正在生成...</div>
      <button id="copyIdBtn" style="display:none;">📋 复制我的 ID</button>
      <button id="showQrBtn" style="display:none;">📷 显示二维码</button>
    </div>
    <div id="qrcode" style="display:none;"></div>
  </div>

  <div class="section">
    <h3>🔌 连接到对方</h3>
    <div class="step">
      输入对方的 ID，点击连接按钮即可建立 P2P 连接
    </div>
    <input type="text" id="peerIdInput" placeholder="输入对方的 ID">
    <button id="connectBtn" disabled>🚀 连接</button>
  </div>

  <div class="section">
    <h3>💬 聊天</h3>
    <div id="chat"></div>
    <input type="text" id="messageInput" placeholder="输入消息..." disabled>
    <button id="sendBtn" disabled>发送</button>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    let peer;
    let conn;
    let myId;

    // 初始化 PeerJS
    function initPeer() {
      // 使用 PeerJS 公共服务器
      peer = new Peer({
        config: {
          iceServers: [
            { urls: "stun:stun.l.google.com:19302" },
            { urls: "stun:stun1.l.google.com:19302" }
          ]
        }
      });

      peer.on('open', (id) => {
        myId = id;
        document.getElementById('myIdDisplay').innerHTML = `<div class="my-id-value">${id}</div>`;
        document.getElementById('copyIdBtn').style.display = 'inline-block';
        document.getElementById('showQrBtn').style.display = 'inline-block';
        document.getElementById('connectBtn').disabled = false;
        updateStatus('等待连接');
        addChatMessage('系统', `你的 ID: ${id}`);
      });

      peer.on('connection', (connection) => {
        conn = connection;
        setupConnection(conn);
        addChatMessage('系统', `收到来自 ${connection.peer} 的连接请求`);
      });

      peer.on('error', (err) => {
        console.error('PeerJS 错误:', err);
        if (err.type === 'peer-unavailable') {
          alert('对方不在线或 ID 不存在');
          updateStatus('连接失败');
        } else {
          addChatMessage('系统', `错误: ${err.type}`);
        }
      });

      peer.on('disconnected', () => {
        addChatMessage('系统', '与信令服务器断开连接');
        updateStatus('已断开');
      });
    }

    // 连接到对方
    document.getElementById('connectBtn').addEventListener('click', () => {
      const peerId = document.getElementById('peerIdInput').value.trim();

      if (!peerId) {
        alert('请输入对方的 ID');
        return;
      }

      if (peerId === myId) {
        alert('不能连接到自己');
        return;
      }

      updateStatus('正在连接...');
      addChatMessage('系统', `正在连接到 ${peerId}...`);

      // 创建连接
      conn = peer.connect(peerId, {
        reliable: true
      });

      setupConnection(conn);
    });

    // 设置连接
    function setupConnection(connection) {
      connection.on('open', () => {
        updateStatus('✅ 已连接');
        addChatMessage('系统', '连接成功！可以开始聊天了');
        document.getElementById('messageInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('connectBtn').disabled = true;
      });

      connection.on('data', (data) => {
        addChatMessage('对方', data);
      });

      connection.on('close', () => {
        updateStatus('连接已关闭');
        addChatMessage('系统', '连接已关闭');
        document.getElementById('messageInput').disabled = true;
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('connectBtn').disabled = false;
      });

      connection.on('error', (err) => {
        console.error('连接错误:', err);
        addChatMessage('系统', `连接错误: ${err}`);
        updateStatus('连接失败');
      });
    }

    // 复制 ID
    document.getElementById('copyIdBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(myId).then(() => {
        alert('ID 已复制到剪贴板');
      });
    });

    // 显示二维码
    document.getElementById('showQrBtn').addEventListener('click', () => {
      const qrcodeDiv = document.getElementById('qrcode');

      if (qrcodeDiv.style.display === 'none') {
        qrcodeDiv.innerHTML = '';
        qrcodeDiv.style.display = 'block';

        // 生成包含 ID 的 URL
        const url = `${window.location.origin}${window.location.pathname}?id=${myId}`;

        new QRCode(qrcodeDiv, {
          text: url,
          width: 256,
          height: 256
        });

        document.getElementById('showQrBtn').textContent = '❌ 隐藏二维码';
      } else {
        qrcodeDiv.style.display = 'none';
        document.getElementById('showQrBtn').textContent = '📷 显示二维码';
      }
    });

    // 更新状态
    function updateStatus(text) {
      const statusEl = document.getElementById('status');
      statusEl.textContent = text;

      if (text.includes('已连接')) {
        statusEl.className = 'status connected';
      } else if (text.includes('失败') || text.includes('已断开') || text.includes('已关闭')) {
        statusEl.className = 'status failed';
      } else {
        statusEl.className = 'status waiting';
      }
    }

    // 添加聊天消息
    function addChatMessage(sender, msg) {
      const chat = document.getElementById('chat');
      const time = new Date().toLocaleTimeString();
      chat.innerHTML += `<div><small>${time}</small> <b>${sender}:</b> ${msg}</div>`;
      chat.scrollTop = chat.scrollHeight;
    }

    // 发送消息
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const msg = input.value.trim();

      if (msg && conn && conn.open) {
        conn.send(msg);
        addChatMessage('我', msg);
        input.value = '';
      }
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);

    // 回车发送
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    // 检查 URL 参数
    window.addEventListener('load', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const peerId = urlParams.get('id');

      if (peerId) {
        document.getElementById('peerIdInput').value = peerId;
        addChatMessage('系统', `检测到 ID: ${peerId}，初始化完成后可点击连接`);
      }
    });

    // 初始化
    initPeer();
  </script>
</body>

</html>
