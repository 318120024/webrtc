<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC 双客户端完整测试</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }

    .container {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .client {
      flex: 1;
      border: 2px solid #ccc;
      padding: 15px;
      border-radius: 8px;
      background: white;
    }

    .client.active {
      border-color: #4CAF50;
      box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
    }

    button {
      margin: 5px;
      padding: 8px 12px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #4CAF50;
      color: white;
      font-size: 14px;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #ccc;
    }

    button.danger {
      background: #f44336;
    }

    button.warning {
      background: #ff9800;
    }

    .log {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 11px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      margin-top: 10px;
    }

    .status {
      padding: 5px 10px;
      border-radius: 3px;
      display: inline-block;
      font-weight: bold;
      margin: 5px 0;
    }

    .status.waiting {
      background: #ff9800;
      color: white;
    }

    .status.connected {
      background: #4CAF50;
      color: white;
    }

    .status.failed {
      background: #f44336;
      color: white;
    }

    input[type="text"] {
      padding: 8px;
      margin: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .room-info {
      background: #e3f2fd;
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
    }

    .room-id {
      font-size: 20px;
      font-weight: bold;
      color: #1976D2;
    }

    .message-section {
      margin-top: 15px;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 5px;
    }

    .message-history {
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px;
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .message-item {
      padding: 5px;
      margin: 3px 0;
      border-radius: 3px;
    }

    .message-item.sent {
      background: #e3f2fd;
      text-align: right;
    }

    .message-item.received {
      background: #f1f8e9;
      text-align: left;
    }

    .message-time {
      font-size: 10px;
      color: #666;
      margin-left: 5px;
    }

    .audio-section {
      margin-top: 15px;
      padding: 10px;
      background: #fff3e0;
      border-radius: 5px;
    }

    .audio-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }

    .audio-status {
      padding: 5px 10px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: bold;
    }

    .audio-status.active {
      background: #4CAF50;
      color: white;
    }

    .audio-status.inactive {
      background: #ccc;
      color: #666;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    .section-title {
      font-weight: bold;
      margin-bottom: 8px;
      color: #333;
    }

    .input-group {
      display: flex;
      gap: 5px;
      margin-top: 5px;
    }

    .input-group input {
      flex: 1;
      margin: 0;
    }
  </style>
</head>

<body>
  <h2>🔗 WebRTC 双客户端完整测试（消息 + 语音）</h2>

  <div style="margin-bottom: 20px;">
    <button id="autoTestBtn">🚀 自动测试（创建房间并连接）</button>
    <button id="resetBtn" class="danger">🔄 重置全部</button>
  </div>

  <div class="container">
    <!-- 客户端 A -->
    <div class="client" id="clientA">
      <h3>客户端 A（发起端）</h3>
      <div class="status waiting" id="statusA">等待操作</div>
      <div class="room-info" id="roomInfoA" style="display:none;">
        房间号: <span class="room-id" id="roomIdA"></span>
      </div>
      <button id="createRoomA">创建房间</button>

      <!-- 消息功能 -->
      <div class="message-section">
        <div class="section-title">📨 消息测试</div>
        <div class="message-history" id="messagesA"></div>
        <div class="input-group">
          <input type="text" id="msgInputA" placeholder="输入自定义消息..." disabled>
          <button id="sendMsgA" disabled>发送</button>
        </div>
        <div style="margin-top: 5px;">
          <button id="sendJsonA" disabled style="font-size: 12px;">发送 JSON</button>
          <button id="sendEmojiA" disabled style="font-size: 12px;">发送 Emoji</button>
        </div>
      </div>

      <!-- 语音功能 -->
      <div class="audio-section">
        <div class="section-title">🎤 语音通话</div>
        <div class="audio-status inactive" id="audioStatusA">未启动</div>
        <div class="audio-controls">
          <button id="startAudioA" style="background: #2196F3;">开启麦克风</button>
          <button id="muteA" disabled class="warning">静音</button>
        </div>
        <audio id="remoteAudioA" autoplay></audio>
      </div>

      <div class="log" id="logA"></div>
    </div>

    <!-- 客户端 B -->
    <div class="client" id="clientB">
      <h3>客户端 B（接收端）</h3>
      <div class="status waiting" id="statusB">等待操作</div>
      <input type="text" id="roomInputB" placeholder="房间号" style="width: 100px;">
      <button id="joinRoomB">加入房间</button>

      <!-- 消息功能 -->
      <div class="message-section">
        <div class="section-title">📨 消息测试</div>
        <div class="message-history" id="messagesB"></div>
        <div class="input-group">
          <input type="text" id="msgInputB" placeholder="输入自定义消息..." disabled>
          <button id="sendMsgB" disabled>发送</button>
        </div>
        <div style="margin-top: 5px;">
          <button id="sendJsonB" disabled style="font-size: 12px;">发送 JSON</button>
          <button id="sendEmojiB" disabled style="font-size: 12px;">发送 Emoji</button>
        </div>
      </div>

      <!-- 语音功能 -->
      <div class="audio-section">
        <div class="section-title">🎤 语音通话</div>
        <div class="audio-status inactive" id="audioStatusB">未启动</div>
        <div class="audio-controls">
          <button id="startAudioB" style="background: #2196F3;">开启麦克风</button>
          <button id="muteB" disabled class="warning">静音</button>
        </div>
        <audio id="remoteAudioB" autoplay></audio>
      </div>

      <div class="log" id="logB"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB1ohgJExMps3YwIbTvU5GKJVTOGNxqWHg",
      authDomain: "webrtc-f1c77.firebaseapp.com",
      databaseURL: "https://webrtc-f1c77-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "webrtc-f1c77",
      storageBucket: "webrtc-f1c77.firebasestorage.app",
      messagingSenderId: "331514264045",
      appId: "1:331514264045:web:1c06dab627d393026d0fe4",
      measurementId: "G-5E0RJMJTFW"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const configuration = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" }
      ]
    };

    class WebRTCClient {
      constructor(name, logElementId, statusElementId, messagesElementId, audioStatusElementId, remoteAudioElementId) {
        this.name = name;
        this.logElement = document.getElementById(logElementId);
        this.statusElement = document.getElementById(statusElementId);
        this.messagesElement = document.getElementById(messagesElementId);
        this.audioStatusElement = document.getElementById(audioStatusElementId);
        this.remoteAudioElement = document.getElementById(remoteAudioElementId);
        this.pc = null;
        this.roomRef = null;
        this.isOfferer = false;
        this.dataChannel = null;
        this.localStream = null;
        this.isMuted = false;
      }

      log(message, data = null) {
        const time = new Date().toLocaleTimeString();
        let logText = `[${time}] ${message}`;
        if (data) {
          logText += '\n' + JSON.stringify(data, null, 2);
        }
        this.logElement.innerHTML += logText + '\n\n';
        this.logElement.scrollTop = this.logElement.scrollHeight;
        console.log(`[${this.name}]`, message, data || '');
      }

      updateStatus(text, type = 'waiting') {
        this.statusElement.textContent = text;
        this.statusElement.className = `status ${type}`;
      }

      addMessage(text, type = 'received') {
        const time = new Date().toLocaleTimeString();
        const msgDiv = document.createElement('div');
        msgDiv.className = `message-item ${type}`;
        msgDiv.innerHTML = `<span>${text}</span><span class="message-time">${time}</span>`;
        this.messagesElement.appendChild(msgDiv);
        this.messagesElement.scrollTop = this.messagesElement.scrollHeight;
      }

      updateAudioStatus(text, active = false) {
        this.audioStatusElement.textContent = text;
        this.audioStatusElement.className = `audio-status ${active ? 'active' : 'inactive'}`;
      }

      createPeerConnection() {
        this.log('创建 PeerConnection');
        this.pc = new RTCPeerConnection(configuration);

        this.pc.onicecandidate = (event) => {
          if (event.candidate && this.roomRef) {
            this.log('生成 ICE 候选', {
              type: event.candidate.type,
              protocol: event.candidate.protocol
            });
            const candidatesRef = this.roomRef.child(
              this.isOfferer ? 'callerCandidates' : 'calleeCandidates'
            );
            candidatesRef.push(event.candidate.toJSON());
          } else if (!event.candidate) {
            this.log('ICE 候选收集完成');
          }
        };

        this.pc.oniceconnectionstatechange = () => {
          this.log('ICE 连接状态: ' + this.pc.iceConnectionState);
        };

        this.pc.onicegatheringstatechange = () => {
          this.log('ICE 收集状态: ' + this.pc.iceGatheringState);
        };

        this.pc.onconnectionstatechange = () => {
          this.log('连接状态: ' + this.pc.connectionState);
          this.updateStatus(`连接状态: ${this.pc.connectionState}`);

          if (this.pc.connectionState === 'connected') {
            this.log('✅ P2P 连接成功！');
            this.updateStatus('✅ 已连接', 'connected');
          } else if (this.pc.connectionState === 'failed') {
            this.log('❌ 连接失败');
            this.updateStatus('❌ 连接失败', 'failed');
          }
        };

        this.pc.onsignalingstatechange = () => {
          this.log('信令状态: ' + this.pc.signalingState);
        };

        // 接收远程音频轨道
        this.pc.ontrack = (event) => {
          this.log('收到远程音频轨道', { kind: event.track.kind });
          if (event.track.kind === 'audio') {
            this.remoteAudioElement.srcObject = event.streams[0];
            this.log('✅ 远程音频已连接');
          }
        };

        // 数据通道
        if (this.isOfferer) {
          this.log('创建数据通道');
          this.dataChannel = this.pc.createDataChannel('chat');
          this.setupDataChannel();
        } else {
          this.pc.ondatachannel = (event) => {
            this.log('收到数据通道');
            this.dataChannel = event.channel;
            this.setupDataChannel();
          };
        }
      }

      setupDataChannel() {
        this.dataChannel.onopen = () => {
          this.log('✅ 数据通道已打开');
          this.enableMessageControls(true);
        };

        this.dataChannel.onmessage = (e) => {
          this.log('收到消息: ' + e.data);
          this.addMessage(e.data, 'received');
        };

        this.dataChannel.onclose = () => {
          this.log('数据通道已关闭');
          this.enableMessageControls(false);
        };

        this.dataChannel.onerror = (err) => {
          this.log('数据通道错误: ' + err);
        };
      }

      enableMessageControls(enabled) {
        const suffix = this.name === '客户端 A' ? 'A' : 'B';
        document.getElementById(`msgInput${suffix}`).disabled = !enabled;
        document.getElementById(`sendMsg${suffix}`).disabled = !enabled;
        document.getElementById(`sendJson${suffix}`).disabled = !enabled;
        document.getElementById(`sendEmoji${suffix}`).disabled = !enabled;
      }

      async startAudio() {
        try {
          this.log('请求麦克风权限...');
          this.localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          this.log('✅ 麦克风已开启');
          this.updateAudioStatus('🎤 麦克风已开启', true);

          if (this.pc) {
            this.localStream.getTracks().forEach(track => {
              this.pc.addTrack(track, this.localStream);
              this.log('音频轨道已添加到 PeerConnection');
            });
          }

          const suffix = this.name === '客户端 A' ? 'A' : 'B';
          document.getElementById(`startAudio${suffix}`).disabled = true;
          document.getElementById(`mute${suffix}`).disabled = false;

          return true;
        } catch (err) {
          this.log('❌ 麦克风开启失败: ' + err.message);
          alert('无法访问麦克风: ' + err.message);
          return false;
        }
      }

      toggleMute() {
        if (!this.localStream) return;

        this.isMuted = !this.isMuted;
        this.localStream.getAudioTracks().forEach(track => {
          track.enabled = !this.isMuted;
        });

        const suffix = this.name === '客户端 A' ? 'A' : 'B';
        const muteBtn = document.getElementById(`mute${suffix}`);

        if (this.isMuted) {
          this.log('🔇 已静音');
          this.updateAudioStatus('🔇 已静音', false);
          muteBtn.textContent = '取消静音';
        } else {
          this.log('🔊 取消静音');
          this.updateAudioStatus('🎤 麦克风已开启', true);
          muteBtn.textContent = '静音';
        }
      }

      async createRoom(roomId) {
        this.log('创建房间: ' + roomId);
        this.isOfferer = true;
        this.roomRef = database.ref('rooms/' + roomId);

        this.createPeerConnection();

        this.log('创建 Offer');
        const offer = await this.pc.createOffer();
        await this.pc.setLocalDescription(offer);
        this.log('Offer 创建成功', { type: offer.type });

        await this.roomRef.child('offer').set({
          type: offer.type,
          sdp: offer.sdp
        });
        this.log('Offer 已写入 Firebase');

        this.updateStatus('等待对方加入');

        this.roomRef.child('answer').on('value', async (snapshot) => {
          const answer = snapshot.val();
          if (answer && !this.pc.currentRemoteDescription) {
            this.log('收到 Answer', { type: answer.type });
            await this.pc.setRemoteDescription(new RTCSessionDescription(answer));
            this.log('Answer 设置成功');
            this.updateStatus('正在建立连接...');
          }
        });

        this.roomRef.child('calleeCandidates').on('child_added', async (snapshot) => {
          const candidate = snapshot.val();
          if (candidate) {
            this.log('收到对方 ICE 候选', { type: candidate.type });
            try {
              await this.pc.addIceCandidate(new RTCIceCandidate(candidate));
              this.log('ICE 候选添加成功');
            } catch (err) {
              this.log('ICE 候选添加失败: ' + err.message);
            }
          }
        });
      }

      async joinRoom(roomId) {
        this.log('加入房间: ' + roomId);
        this.isOfferer = false;
        this.roomRef = database.ref('rooms/' + roomId);

        this.createPeerConnection();

        this.log('等待 Offer');
        const offerSnapshot = await this.roomRef.child('offer').get();
        const offer = offerSnapshot.val();

        if (!offer) {
          this.log('❌ 房间不存在');
          alert('房间不存在');
          return;
        }

        this.log('收到 Offer', { type: offer.type });
        await this.pc.setRemoteDescription(new RTCSessionDescription(offer));
        this.log('Offer 设置成功');

        this.log('创建 Answer');
        const answer = await this.pc.createAnswer();
        await this.pc.setLocalDescription(answer);
        this.log('Answer 创建成功', { type: answer.type });

        await this.roomRef.child('answer').set({
          type: answer.type,
          sdp: answer.sdp
        });
        this.log('Answer 已写入 Firebase');

        this.updateStatus('正在建立连接...');

        this.roomRef.child('callerCandidates').on('child_added', async (snapshot) => {
          const candidate = snapshot.val();
          if (candidate) {
            this.log('收到对方 ICE 候选', { type: candidate.type });
            try {
              await this.pc.addIceCandidate(new RTCIceCandidate(candidate));
              this.log('ICE 候选添加成功');
            } catch (err) {
              this.log('ICE 候选添加失败: ' + err.message);
            }
          }
        });
      }

      sendMessage(msg) {
        if (this.dataChannel && this.dataChannel.readyState === 'open') {
          this.dataChannel.send(msg);
          this.log('发送消息: ' + msg);
          this.addMessage(msg, 'sent');
        } else {
          this.log('❌ 数据通道未打开');
          alert('数据通道未打开');
        }
      }

      cleanup() {
        if (this.localStream) {
          this.localStream.getTracks().forEach(track => track.stop());
          this.localStream = null;
        }
        if (this.pc) {
          this.pc.close();
          this.pc = null;
        }
        if (this.roomRef) {
          this.roomRef.off();
          this.roomRef = null;
        }
        this.dataChannel = null;
        this.logElement.innerHTML = '';
        this.messagesElement.innerHTML = '';
        this.updateStatus('等待操作');
        this.updateAudioStatus('未启动', false);
        this.enableMessageControls(false);

        const suffix = this.name === '客户端 A' ? 'A' : 'B';
        document.getElementById(`startAudio${suffix}`).disabled = false;
        document.getElementById(`mute${suffix}`).disabled = true;
      }
    }

    const clientA = new WebRTCClient('客户端 A', 'logA', 'statusA', 'messagesA', 'audioStatusA', 'remoteAudioA');
    const clientB = new WebRTCClient('客户端 B', 'logB', 'statusB', 'messagesB', 'audioStatusB', 'remoteAudioB');

    let currentRoomId = null;

    function generateRoomId() {
      return Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    // 创建房间
    document.getElementById('createRoomA').addEventListener('click', async () => {
      currentRoomId = generateRoomId();
      document.getElementById('roomIdA').textContent = currentRoomId;
      document.getElementById('roomInfoA').style.display = 'block';
      document.getElementById('roomInputB').value = currentRoomId;
      document.getElementById('clientA').classList.add('active');

      await clientA.createRoom(currentRoomId);
    });

    // 加入房间
    document.getElementById('joinRoomB').addEventListener('click', async () => {
      const roomId = document.getElementById('roomInputB').value.trim().toUpperCase();
      if (!roomId) {
        alert('请输入房间号');
        return;
      }
      document.getElementById('clientB').classList.add('active');
      await clientB.joinRoom(roomId);
    });

    // 自动测试
    document.getElementById('autoTestBtn').addEventListener('click', async () => {
      console.log('开始自动测试...');

      clientA.cleanup();
      clientB.cleanup();

      currentRoomId = generateRoomId();
      document.getElementById('roomIdA').textContent = currentRoomId;
      document.getElementById('roomInfoA').style.display = 'block';
      document.getElementById('roomInputB').value = currentRoomId;

      console.log('客户端 A 创建房间...');
      await clientA.createRoom(currentRoomId);

      await new Promise(resolve => setTimeout(resolve, 2000));

      console.log('客户端 B 加入房间...');
      await clientB.joinRoom(currentRoomId);
    });

    // 客户端 A 消息功能
    document.getElementById('sendMsgA').addEventListener('click', () => {
      const input = document.getElementById('msgInputA');
      const msg = input.value.trim();
      if (msg) {
        clientA.sendMessage(msg);
        input.value = '';
      }
    });

    document.getElementById('msgInputA').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('sendMsgA').click();
      }
    });

    document.getElementById('sendJsonA').addEventListener('click', () => {
      const jsonMsg = JSON.stringify({
        type: 'test',
        data: { value: 123, timestamp: Date.now() },
        from: 'Client A'
      });
      clientA.sendMessage(jsonMsg);
    });

    document.getElementById('sendEmojiA').addEventListener('click', () => {
      clientA.sendMessage('👋 你好！🎉🚀💻');
    });

    // 客户端 B 消息功能
    document.getElementById('sendMsgB').addEventListener('click', () => {
      const input = document.getElementById('msgInputB');
      const msg = input.value.trim();
      if (msg) {
        clientB.sendMessage(msg);
        input.value = '';
      }
    });

    document.getElementById('msgInputB').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('sendMsgB').click();
      }
    });

    document.getElementById('sendJsonB').addEventListener('click', () => {
      const jsonMsg = JSON.stringify({
        type: 'test',
        data: { value: 456, timestamp: Date.now() },
        from: 'Client B'
      });
      clientB.sendMessage(jsonMsg);
    });

    document.getElementById('sendEmojiB').addEventListener('click', () => {
      clientB.sendMessage('👍 收到！✨🎵🔥');
    });

    // 客户端 A 语音功能
    document.getElementById('startAudioA').addEventListener('click', async () => {
      await clientA.startAudio();
    });

    document.getElementById('muteA').addEventListener('click', () => {
      clientA.toggleMute();
    });

    // 客户端 B 语音功能
    document.getElementById('startAudioB').addEventListener('click', async () => {
      await clientB.startAudio();
    });

    document.getElementById('muteB').addEventListener('click', () => {
      clientB.toggleMute();
    });

    // 重置
    document.getElementById('resetBtn').addEventListener('click', () => {
      clientA.cleanup();
      clientB.cleanup();
      document.getElementById('roomInfoA').style.display = 'none';
      document.getElementById('roomInputB').value = '';

    });
